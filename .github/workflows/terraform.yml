name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: '1.5.7'

jobs:
  terraform-iam:
    name: Terraform IAM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./iam

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Install Yandex Cloud CLI
      run: |
        curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
        echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

    - name: Authenticate Yandex Cloud
      env:
        YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
      run: |
        echo "$YC_SA_KEY" > sa-key.json
        export YC_SERVICE_ACCOUNT_KEY_FILE=$(pwd)/sa-key.json
        yc config profile create ci-profile

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan
      if: github.event_name == 'pull_request'

  terraform-infra:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    needs: terraform-iam
    defaults:
      run:
        working-directory: ./infra

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Install Yandex Cloud CLI
      run: |
        curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
        echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

    - name: Authenticate Yandex Cloud
      env:
        YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
      run: |
        echo "$YC_SA_KEY" > sa-key.json
        export YC_SERVICE_ACCOUNT_KEY_FILE=$(pwd)/sa-key.json
        yc config profile create ci-profile

    - name: Terraform Init
      env:
        TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        TF_STATE_ACCESS_KEY: ${{ secrets.TF_STATE_ACCESS_KEY }}
        TF_STATE_SECRET_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
      run: |
        terraform init \
          -backend-config="endpoint=https://storage.yandexcloud.net" \
          -backend-config="bucket=$TF_STATE_BUCKET" \
          -backend-config="key=terraform.tfstate" \
          -backend-config="region=ru-central1" \
          -backend-config="access_key=$TF_STATE_ACCESS_KEY" \
          -backend-config="secret_key=$TF_STATE_SECRET_KEY"

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan
      if: github.event_name == 'pull_request'

    - name: Terraform Show
      run: terraform show -no-color
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
EOF