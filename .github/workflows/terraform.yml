name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: '1.5.7'
  YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
  YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
  YC_SA_KEY: ${{ secrets.YC_SA_KEY }}

jobs:
  terraform-iam:
    name: Terraform IAM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./iam

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Install Yandex Cloud CLI
      run: |
        curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
        echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

    - name: Setup Yandex Cloud Profile
      run: |
        echo "$YC_SA_KEY" > sa-key.json
        yc config profile create ci-profile
        yc config set cloud-id "$YC_CLOUD_ID"
        yc config set folder-id "$YC_FOLDER_ID"
        yc config set service-account-key-file sa-key.json

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan
      if: github.event_name == 'pull_request'

  terraform-infra:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    needs: terraform-iam
    defaults:
      run:
        working-directory: ./infra

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Install Yandex Cloud CLI
      run: |
        curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
        echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

    - name: Setup Yandex Cloud Profile
      run: |
        echo "$YC_SA_KEY" > sa-key.json
        yc config profile create ci-profile
        yc config set cloud-id "$YC_CLOUD_ID"
        yc config set folder-id "$YC_FOLDER_ID"
        yc config set service-account-key-file sa-key.json

    - name: Get S3 credentials
      run: |
        # Получаем access key и secret key из terraform outputs
        cd ../iam
        TF_STATE_ACCESS_KEY=$(terraform output -raw sa_access_key)
        TF_STATE_SECRET_KEY=$(terraform output -raw sa_secret_key)
        TF_STATE_BUCKET=$(terraform output -raw bucket_name)
        
        # Сохраняем как environment variables
        echo "TF_STATE_ACCESS_KEY=$TF_STATE_ACCESS_KEY" >> $GITHUB_ENV
        echo "TF_STATE_SECRET_KEY=$TF_STATE_SECRET_KEY" >> $GITHUB_ENV
        echo "TF_STATE_BUCKET=$TF_STATE_BUCKET" >> $GITHUB_ENV

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=$TF_STATE_BUCKET" \
          -backend-config="key=terraform.tfstate" \
          -backend-config="region=ru-central1" \
          -backend-config="access_key=$TF_STATE_ACCESS_KEY" \
          -backend-config="secret_key=$TF_STATE_SECRET_KEY"

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan
      if: github.event_name == 'pull_request'

    - name: Terraform Show
      run: terraform show -no-color
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'